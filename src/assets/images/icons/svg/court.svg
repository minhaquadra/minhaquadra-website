<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer court boundary -->
  <rect x="1.5" y="6" width="37" height="28" rx="1.5" stroke="#002d3c" stroke-width="2.5"/>
  <!-- Center dividing line -->
  <line x1="20" y1="6" x2="20" y2="34" stroke="#002d3c" stroke-width="2"/>
  <!-- Center circle -->
  <circle cx="20" cy="20" r="4.5" stroke="#002d3c" stroke-width="2"/>
  <!-- Left service box arc -->
  <path d="M 9 9 L 9 31" stroke="#002d3c" stroke-width="2" stroke-linecap="round"/>
  <!-- Right service box arc -->
  <path d="M 31 9 L 31 31" stroke="#002d3c" stroke-width="2" stroke-linecap="round"/>
  <!-- Left penalty dot -->
  <circle cx="5.5" cy="20" r="1.25" fill="#002d3c"/>
  <!-- Right penalty dot -->
  <circle cx="34.5" cy="20" r="1.25" fill="#002d3c"/>
  <!-- Left penalty arc -->
  <path d="M 9 16.5 Q 14.5 20 9 23.5" stroke="#002d3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right penalty arc -->
  <path d="M 31 16.5 Q 25.5 20 31 23.5" stroke="#002d3c" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
